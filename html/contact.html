<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kontakt | CarBlog</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <nav>
        <h1 style="font-weight: 300">CarBlog</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">O nás</a></li>
            <li><a href="contact.html">Kontakt</a></li>
            <li><a href="gallery.html"> Galéria</a></li>
        </ul>
        </nav>
    </header>
    <main>
        <h2 class="contact-form-title">Kontaktujte nás a my sa ozveme.</h2>
        <form action="submit" method="post"class="contact-form">
            <label for="name">Meno:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Správa:</label>
            <textarea id="message" name="message" required></textarea>
            <label for="subject">Typ požiadavky</label>
            <select name="subject" id="subject" class="contact-form-select">
                <option name="sprava" value="sprava">Správa</option>
                <option name="rezervacia" value="rezervacia">Rezervácia</option>
                <option name="ine" value="ine">Iné</option>
                <option value="ine">Iné</option>
            </select>
            <div class="contact-form-checkbox-row">
                <input type="checkbox" id="checkbox" name="checkbox" class="contact-form-checkbox" required>
                <label for="checkbox">Súhlasím s obchodnými podmienkami</label>
            </div>
            <button type="submit" class="contact-form-button">Odoslať</button>
        </form>
    </main>
    <footer>
        <p>
            &copy; 2026 CarBlog
        </p>
    </footer>
</body>
</html>
